apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apps

helmGlobals:
  chartHome: ../../../helm-chart

helmCharts:
  - name: api-service
    releaseName: api-service
    namespace: apps
    valuesInline:
      image:
        repository: api-service
        tag: sandbox

# Pin the image for the sandbox.
images:
  - name: api
    newTag: sandbox

# Give the workload a small resource floor in the sandbox.
patches:
  - target:
      kind: Deployment
      name: api-svc
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
